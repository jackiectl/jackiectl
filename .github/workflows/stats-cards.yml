name: Refresh profile cards

# All three cards are drawn by our own scripts in tools/ and committed as static SVGs.
# Nothing here calls a card service at render time, which buys four things:
#   - no third-party service holding a token that can read private repos
#   - no camo cache staleness (assets/ is served through /raw/)
#   - the cards keep working when a public instance dies, as two of them already did
#   - the labels are ours, so a row cannot say "(last year)" over an all-time number
#
# Token: uses STATS_PAT if that secret exists, otherwise the built-in GITHUB_TOKEN.
#   - GITHUB_TOKEN  -> public repositories only (no setup, no risk)
#   - STATS_PAT     -> add a classic PAT with `repo` + `read:user` to include PRIVATE repos
# Adding or removing that secret switches behaviour with no code change.

on:
  schedule:
    # Every three hours. The cards are served from assets/ through /raw/, which is not behind
    # camo, so a viewer sees a new number the moment this job commits — the refresh interval
    # is the only latency there is. Minute 7 rather than 0 on purpose: GitHub queues scheduled
    # runs and the top of the hour is the most contended slot, so :07 starts sooner in
    # practice. A run that finds no changed number commits nothing, so idle periods stay silent.
    - cron: "7 */3 * * *"
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/stats-cards.yml"
      - "tools/**"
      - "data/profile.json"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Which token got used is otherwise invisible, and it is the difference between the
      # card showing public-only numbers and real ones. Compared as a boolean expression so
      # the value itself never reaches the shell.
      - name: Report which token is in use
        env:
          HAS_PAT: ${{ secrets.STATS_PAT != '' }}
        run: |
          if [ "$HAS_PAT" = "true" ]; then
            echo "STATS_PAT present -> private repositories are included"
          else
            echo "STATS_PAT absent -> falling back to GITHUB_TOKEN (public repositories only)"
          fi

      # Ours now. The upstream action's row labels are fixed, and one of them prints
      # "(last year)" over a number that has no time window — see tools/stats.py.
      - name: Generate stats card
        env:
          GITHUB_TOKEN: ${{ secrets.STATS_PAT || secrets.GITHUB_TOKEN }}
        run: python3 tools/stats.py

      - name: Generate streak card
        env:
          GITHUB_TOKEN: ${{ secrets.STATS_PAT || secrets.GITHUB_TOKEN }}
        run: python3 tools/streak.py

      - name: Generate contribution graph
        env:
          GITHUB_TOKEN: ${{ secrets.STATS_PAT || secrets.GITHUB_TOKEN }}
        run: python3 tools/contrib.py

      - name: Rebuild README from the data
        run: python3 build.py

      - name: Commit if the numbers moved
        run: |
          # Commit as the bot, NOT as jackiectl. GitHub credits contributions to the commit
          # author, so committing as the owner would make this daily refresh a contribution
          # in its own right — inflating the very commit count the card reports.
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets README.md
          if git diff --cached --quiet; then
            echo "no card changed — nothing to commit"
            exit 0
          fi
          git commit -m "Refresh profile cards"
          git push
