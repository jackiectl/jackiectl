name: Refresh contribution graph

# The window is rolling — it always ends at the current month — so the SVGs go stale on their
# own even when nobody touches the repo. This redraws them and commits only if the numbers
# actually moved.

on:
  schedule:
    - cron: "17 4 * * *"   # daily, 04:17 UTC
  workflow_dispatch:        # and on demand, from the Actions tab
  push:
    paths:
      - "data/profile.json"        # e.g. changing `months`
      - "tools/contrib.py"
      - ".github/workflows/contributions.yml"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Parked while the README ships the daily card (cards.active_graph == "daily").
      # The cron stays on purpose: flip that one word to "monthly" and this resumes by itself,
      # with no second edit here.
      - id: mode
        run: |
          mode=$(python3 -c "import json;print(json.load(open('data/profile.json'))['cards'].get('active_graph','daily'))")
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          [ "$mode" = "monthly" ] || echo "active_graph=$mode — monthly graph is parked, skipping"

      - name: Redraw the monthly bars
        if: steps.mode.outputs.mode == 'monthly'
        env:
          # The default token can read a public contributionsCollection. If GitHub ever
          # tightens that, put a PAT with read:user in a repo secret and use it here.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 tools/contrib.py

      - name: Rebuild README from the data
        if: steps.mode.outputs.mode == 'monthly'
        run: python3 build.py

      - name: Commit if the numbers moved
        if: steps.mode.outputs.mode == 'monthly'
        run: |
          # Commit as the bot, NOT as jackiectl. GitHub credits contributions to the commit
          # author, so a commit authored by the owner here would itself become a contribution
          # — inflating the very number this graph reports, every single day, forever.
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets README.md
          if git diff --cached --quiet; then
            echo "contribution counts unchanged — nothing to commit"
            exit 0
          fi
          git commit -m "Refresh contribution graph"
          git push
